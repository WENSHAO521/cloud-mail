name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 2.4.0'
        required: true
        default: '2.4.0'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact_name: windows-installer
          - os: macos-latest
            platform: mac
            artifact_name: mac-installer
          - os: ubuntu-22.04
            platform: linux
            artifact_name: linux-installer

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Normalize release version
        shell: bash
        run: |
          version="${RELEASE_VERSION#v}"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$version" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mail-vue/package-lock.json

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        working-directory: mail-vue
        run: npm ci --legacy-peer-deps
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Generate icon.icns (macOS only)
        if: matrix.platform == 'mac'
        working-directory: mail-vue
        run: |
          mkdir -p icon.iconset
          sips -z 16   16   build/icon.png --out icon.iconset/icon_16x16.png
          sips -z 32   32   build/icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32   32   build/icon.png --out icon.iconset/icon_32x32.png
          sips -z 64   64   build/icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128  128  build/icon.png --out icon.iconset/icon_128x128.png
          sips -z 256  256  build/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256  256  build/icon.png --out icon.iconset/icon_256x256.png
          sips -z 512  512  build/icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512  512  build/icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 build/icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o build/icon.icns
          rm -rf icon.iconset

      - name: Build installer
        working-directory: mail-vue
        run: npm run electron:build -- --${{ matrix.platform }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          USE_HARD_LINKS: false
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            mail-vue/dist-electron/*.exe
            mail-vue/dist-electron/*.dmg
            mail-vue/dist-electron/*.zip
            mail-vue/dist-electron/*.deb
            mail-vue/dist-electron/*.AppImage
            mail-vue/dist-electron/*.rpm
            mail-vue/dist-electron/latest*.yml
            mail-vue/dist-electron/*.blockmap

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Normalize release version
        shell: bash
        run: |
          version="${RELEASE_VERSION#v}"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$version" >> "$GITHUB_ENV"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Show release assets
        run: ls -la release-assets

      - name: Create one GitHub Release with all assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.RELEASE_VERSION }}
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
