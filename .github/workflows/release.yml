name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-22.04
            platform: linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mail-vue/package-lock.json

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        working-directory: mail-vue
        run: npm ci --legacy-peer-deps

      - name: Generate icon.icns (macOS only)
        if: matrix.platform == 'mac'
        working-directory: mail-vue
        run: |
          mkdir -p icon.iconset
          sips -z 16   16   build/icon.png --out icon.iconset/icon_16x16.png
          sips -z 32   32   build/icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32   32   build/icon.png --out icon.iconset/icon_32x32.png
          sips -z 64   64   build/icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128  128  build/icon.png --out icon.iconset/icon_128x128.png
          sips -z 256  256  build/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256  256  build/icon.png --out icon.iconset/icon_256x256.png
          sips -z 512  512  build/icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512  512  build/icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 build/icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o build/icon.icns
          rm -rf icon.iconset

      - name: Build & publish to draft release
        working-directory: mail-vue
        run: npm run electron:build -- --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          USE_HARD_LINKS: false
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

  # Runs even if one platform fails — publishes whatever was uploaded
  publish-release:
    needs: build
    runs-on: ubuntu-latest
    if: always() && needs.build.result != 'cancelled'
    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          RELEASE_ID=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/WENSHAO521/cloud-mail/releases/tags/$TAG" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -s -X PATCH -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/WENSHAO521/cloud-mail/releases/$RELEASE_ID" \
            -d '{"draft":false}'
          echo "Release $TAG published."
