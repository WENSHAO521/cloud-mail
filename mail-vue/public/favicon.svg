<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Background: rich near-black -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <!-- Envelope body: crimson → deep dark-red -->
    <linearGradient id="env" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#DD0000"/>
      <stop offset="50%"  stop-color="#880000"/>
      <stop offset="100%" stop-color="#1a0000"/>
    </linearGradient>
    <!-- Top shine on envelope -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5"
                    flood-color="#000000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Background: rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle inner glow border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5"
        fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Envelope body (generous padding, centered) -->
  <rect x="3.5" y="8" width="25" height="17" rx="1.5"
        fill="url(#env)" filter="url(#sh)"/>

  <!-- Outer envelope border -->
  <rect x="3.5" y="8" width="25" height="17" rx="1.5"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>

  <!-- Top shine layer -->
  <path d="M5 8 Q3.5 8 3.5 9.5 L3.5 13.5 L28.5 13.5 L28.5 9.5 Q28.5 8 27 8 Z"
        fill="url(#shine)"/>

  <!-- Envelope flap: white V -->
  <path d="M4 8.5 L16 18 L28 8.5"
        stroke="rgba(255,255,255,0.90)" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Bottom fold lines -->
  <path d="M4 24.5 L9.5 19"
        stroke="rgba(255,255,255,0.35)" stroke-width="1"
        stroke-linecap="round"/>
  <path d="M28 24.5 L22.5 19"
        stroke="rgba(255,255,255,0.35)" stroke-width="1"
        stroke-linecap="round"/>

  <!-- Red seal dot at fold point -->
  <circle cx="16" cy="18" r="2.2" fill="#CC0000"/>
  <circle cx="16" cy="18" r="1"   fill="rgba(255,255,255,0.7)"/>
</svg>
