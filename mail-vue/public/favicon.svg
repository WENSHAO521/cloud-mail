<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Solid near-black background — no gradient, flat Bauhaus fill -->
  <rect width="32" height="32" rx="3" fill="#111111"/>

  <!-- Red book-spine bar — left edge, full height, publisher identity mark -->
  <rect x="0" y="0" width="5" height="32" fill="#CC0000"/>

  <!-- White "P" — geometric, editorial proportions -->
  <!-- Vertical stem -->
  <rect x="10" y="7" width="3.5" height="18" fill="#FFFFFF"/>
  <!-- Bowl: filled D-shape -->
  <path d="M 13.5 7 H 19.5 C 22.5 7 24.5 9 24.5 11.8 C 24.5 14.6 22.5 16.6 19.5 16.6 H 13.5 Z"
        fill="#FFFFFF"/>
  <!-- Bowl inner cutout -->
  <path d="M 13.5 9.6 H 19 C 21 9.6 22 10.5 22 11.8 C 22 13.1 21 14 19 14 H 13.5 Z"
        fill="#111111"/>

  <!-- Colophon rule — thin red rule below P, classic scholarly press mark -->
  <rect x="10" y="27" width="14.5" height="1.5" fill="#CC0000"/>
</svg>
