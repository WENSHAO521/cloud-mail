<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="env" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#CC0000"/>
      <stop offset="55%"  stop-color="#880000"/>
      <stop offset="100%" stop-color="#2a0000"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5"
                    flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background: near-black rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Red bottom edge accent line -->
  <rect x="0" y="28" width="32" height="4" rx="0 0 7 7" fill="#CC0000" opacity="0.7"/>

  <!-- Envelope body -->
  <rect x="4.5" y="9" width="23" height="15" rx="1.5"
        fill="url(#env)" filter="url(#sh)"/>

  <!-- Envelope outer border -->
  <rect x="4.5" y="9" width="23" height="15" rx="1.5"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>

  <!-- Shine highlight on top of envelope -->
  <path d="M6 9 Q4.5 9 4.5 10.5 L4.5 14 L27.5 14 L27.5 10.5 Q27.5 9 26 9 Z"
        fill="url(#shine)"/>

  <!-- Envelope flap: crisp white V -->
  <path d="M5 9.5 L16 18 L27 9.5"
        stroke="rgba(255,255,255,0.92)" stroke-width="1.6"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Bottom fold lines -->
  <path d="M5 23.5 L10 18.5"
        stroke="rgba(255,255,255,0.4)" stroke-width="1"
        stroke-linecap="round"/>
  <path d="M27 23.5 L22 18.5"
        stroke="rgba(255,255,255,0.4)" stroke-width="1"
        stroke-linecap="round"/>

  <!-- Seal: red dot + white inner at fold centre -->
  <circle cx="16" cy="18" r="2" fill="#CC0000"/>
  <circle cx="16" cy="18" r="0.9" fill="rgba(255,255,255,0.65)"/>
</svg>
